# NOT USED: OVN-K rejects RouteAdvertisements for EVPN networks in the default
# VRF. Instead, VRF route leaking is configured via raw FRR config in
# frrconfiguration-all-nodes.yaml to import the CUDN subnet into default VRF BGP.
apiVersion: k8s.ovn.org/v1
kind: RouteAdvertisements
metadata:
  name: default
spec:
  advertisements:
  - PodNetwork
  frrConfigurationSelector:
    matchLabels:
      peering: "aws"
  networkSelectors:
  - clusterUserDefinedNetworkSelector:
      networkSelector:
        matchLabels:
          advertise: "true"
    networkSelectionType: ClusterUserDefinedNetworks
  nodeSelector: {}
