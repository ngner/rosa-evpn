frr defaults traditional
hostname evpn-rr
log syslog informational
!
router bgp 65512
 bgp router-id 192.168.188.152
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp listen range 192.168.188.0/24 peer-group local
 bgp listen range 10.0.0.0/8 peer-group rosa
 neighbor local peer-group
 neighbor local remote-as 65512
 neighbor rosa peer-group
 neighbor rosa remote-as 65512
 !
 address-family ipv4 unicast
  neighbor local activate
  neighbor local route-reflector-client
  neighbor rosa activate
  neighbor rosa route-reflector-client
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor local activate
  neighbor local route-reflector-client
  neighbor rosa activate
  neighbor rosa route-reflector-client
 exit-address-family
!
line vty
!
